<div class="helper-dog">
  <!-- Mascota / acceso futuro a tutoriales por contexto (driver.js vía HelperService / registry). -->
  <div class="helper-dog-container">
    <div class="speech-bubble woof-message" *ngIf="showWoofMessage">
      <div class="woof-content">
        <span class="woof-text">WOOF!</span>
      </div>
    </div>
    <img
      src="assets/awoo-awoo-shoppe.gif"
      alt="Asistente"
      class="helper-dog-image"
      [class.bounce]="isBouncing"
      (click)="onDogClick()">
  </div>
</div>
