<app-notification-container></app-notification-container>

<div class="generic-container ticket-create-container">
  <div class="header-section">
    <div class="title-row">
      <div class="title-wrapper">
        <h1>
          <i class="fas fa-plus-circle"></i>
          Nuevo ticket / reclamo
        </h1>
      </div>
      <a routerLink="/menu/tickets" class="btn btn-secondary btn-sm">Volver</a>
    </div>
  </div>

  <div class="content-section">
    <h2 class="ticket-section-heading ticket-section-heading--accent">
      <i class="fas fa-file-alt" aria-hidden="true"></i>
      <span>Datos del reclamo</span>
    </h2>
    <div class="ticket-section-body">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-bold">Título</label>
          <input class="form-control" [(ngModel)]="form.titulo" maxlength="200" placeholder="Resumen breve del reclamo" />
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Área destino</label>
          <select class="form-select" [(ngModel)]="form.areaDestino">
            <option value="">Seleccionar...</option>
            <option *ngFor="let area of areas" [value]="area">{{ area }}</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Prioridad</label>
          <select class="form-select" [(ngModel)]="form.prioridad">
            <option *ngFor="let p of prioridades" [value]="p">{{ p }}</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold">Descripción</label>
          <textarea class="form-control" rows="5" [(ngModel)]="form.descripcion" placeholder="Detalle completo del reclamo"></textarea>
        </div>

        <div class="col-12">
          <label class="form-label fw-bold">Nota inicial (opcional)</label>
          <textarea class="form-control" rows="3" [(ngModel)]="form.nota" placeholder="Nota de contexto para el primer movimiento"></textarea>
        </div>
      </div>

      <div class="ticket-form-actions">
        <button
          type="button"
          class="btn btn-ticket-create-submit"
          [disabled]="creando"
          (click)="guardar()">
          <i class="fas" [ngClass]="creando ? 'fa-spinner fa-spin' : 'fa-save'"></i>
          {{ creando ? 'Creando...' : 'Crear ticket' }}
        </button>
        <a routerLink="/menu/tickets" class="btn btn-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>
