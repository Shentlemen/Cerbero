<app-notification-container></app-notification-container>

<div class="generic-container tickets-container">
  <div class="header-section">
    <div class="title-row">
      <div class="title-wrapper">
        <h1>
          <i class="fas fa-ticket-alt"></i>
          Tickets / Reclamos
        </h1>
      </div>
      <a *ngIf="canCreateTickets()" routerLink="/menu/tickets/nuevo" class="btn btn-tickets-new btn-sm">
        <i class="fas fa-plus"></i>
        Nuevo ticket
      </a>
    </div>
    <div class="tickets-filter-row">
      <label class="tickets-filter-label">Estado</label>
      <select
        class="form-select form-select-sm tickets-filter-select"
        [(ngModel)]="estadoFiltro"
        (change)="cargarTickets()">
        <option value="">Todos</option>
        <option *ngFor="let estado of estados" [value]="estado">{{ getEstadoLabel(estado) }}</option>
      </select>
      <button type="button" class="btn btn-secondary btn-sm" (click)="cargarTickets()">
        <i class="fas fa-rotate-right"></i>
        Actualizar
      </button>
    </div>
  </div>

  <div class="content-section">
      <div *ngIf="loading" class="text-center py-4">
        <div class="spinner-border text-primary"></div>
      </div>

      <div *ngIf="!loading && tickets.length === 0" class="text-center text-muted py-4">
        No hay tickets para mostrar.
      </div>

      <div class="table-container" *ngIf="!loading && tickets.length > 0">
        <table class="generic-table">
          <thead>
            <tr>
              <th>Código</th>
              <th>Título</th>
              <th>Área</th>
              <th>Estado</th>
              <th>Prioridad</th>
              <th>Actualizado</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let ticket of tickets" class="generic-row">
              <td><strong>{{ ticket.codigo }}</strong></td>
              <td>{{ ticket.titulo }}</td>
              <td>{{ ticket.areaActual }}</td>
              <td><span [class]="getEstadoClass(ticket.estado)">{{ getEstadoLabel(ticket.estado) }}</span></td>
              <td><span [class]="getPrioridadClass(ticket.prioridad)">{{ ticket.prioridad }}</span></td>
              <td>{{ ticket.fechaActualizacion | date:'dd/MM/yyyy HH:mm' }}</td>
              <td class="text-end">
                <a [routerLink]="['/menu/tickets', ticket.id]" class="btn btn-info btn-sm">
                  Abrir
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
  </div>
</div>
