<!-- Wrapper para compensar zoom del body: zoom 1.25 (1/0.8) alinea mouse con partículas -->
<div class="particles-zoom-wrapper">
  <ngx-particles [options]="particlesOptions"></ngx-particles>
</div>
<div class="home-container"></div> <!-- Este div solo se usa para el fondo negro -->
<div class="content-container">
    <img src="assets/logo4.png" alt="Cerbero Logo" class="logo">
    <div *ngIf="registrationNotice" class="login-info-notice">
      Su cuenta fue registrada correctamente. Debe esperar a que un administrador del sistema habilite su usuario
      antes de poder iniciar sesión.
    </div>
    <form class="login-form" (ngSubmit)="onSubmit()">
        <input type="text" placeholder="Usuario" [(ngModel)]="username" name="username" required>
        <input type="password" placeholder="Contraseña" [(ngModel)]="password" name="password" required>
        <button type="submit" [disabled]="loading">
            <span *ngIf="loading">Iniciando sesión...</span>
            <span *ngIf="!loading">Iniciar Sesión</span>
        </button>
        <div *ngIf="loginError" class="login-error">
            {{ errorMessage }}
        </div>
    </form>
    <p class="login-register-row">
      <a routerLink="/register" class="login-register-link">¿No tiene cuenta? Registrarse</a>
    </p>
</div>
